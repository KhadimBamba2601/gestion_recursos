{% extends 'base.html' %}

{% block content %}
    <h1>Crear nueva tarea</h1>

    <form method="POST">
        <div class="form-group">
            <label for="nombre">Nombre:</label>
            <input type="text" name="nombre" id="nombre" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="descripcion">Descripción:</label>
            <textarea name="descripcion" id="descripcion" class="form-control"></textarea>
        </div>
        <div class="form-group">
            <label for="frecuencia">Frecuencia:</label>
            <input type="text" name="frecuencia" id="frecuencia" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="fecha_ejecucion">Fecha de ejecución:</label>
            <input type="datetime-local" name="fecha_ejecucion" id="fecha_ejecucion" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">Crear</button>
    </form>
{% endblock %}
<form method="POST">
    {{ form.csrf_token }}
    <div class="form-group">
        <label for="username">Nombre de usuario:</label>
        <input type="text" name="username" id="username" class="form-control" required>
    </div>
    <div class="form-group">
        <label for="password">Contraseña:</label>
        <input type="password" name="password" id="password" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary">Iniciar sesión</button>
</form>
