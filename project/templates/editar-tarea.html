{% extends 'base.html' %}

{% block content %}
    <h1>Editar tarea</h1>

    <form method="POST">
        <div class="form-group">
            <label for="nombre">Nombre:</label>
            <input type="text" name="nombre" id="nombre" class="form-control" value="{{ tarea.nombre }}" required>
        </div>
        <div class="form-group">
            <label for="descripcion">Descripción:</label>
            <textarea name="descripcion" id="descripcion" class="form-control">{{ tarea.descripcion }}</textarea>
        </div>
        <div class="form-group">
            <label for="frecuencia">Frecuencia:</label>
            <input type="text" name="frecuencia" id="frecuencia" class="form-control" value="{{ tarea.frecuencia }}" required>
        </div>
        <div class="form-group">
            <label for="fecha_ejecucion">Fecha de ejecución:</label>
            <input type="datetime-local" name="fecha_ejecucion" id="fecha_ejecucion" class="form-control" value="{{ tarea.fecha_ejecucion.strftime('%Y-%m-%d %H:%M') }}" required>
        </div>
        <button type="submit" class="btn btn-primary">Guardar cambios</button>
    </form>
{% endblock %}
